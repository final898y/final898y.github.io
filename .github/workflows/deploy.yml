name: Deploy Main Site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 檢出程式碼
      - name: Checkout
        uses: actions/checkout@v4

      # 設置 Node.js
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 安裝依賴
      - name: Install dependencies
        run: npm ci

      # 建置主站
      - name: Build main site
        run: npm run build

      # 從 gh-pages 分支恢復 blog 資料夾，確保它不會被覆蓋
      - name: Restore blog from gh-pages
        run: |
          git fetch origin gh-pages --depth=1
          git checkout origin/gh-pages -- blog || echo "Blog directory not found on gh-pages, skipping."
          if [ -d "blog" ]; then
            mv blog dist/
            echo "Successfully restored blog directory to dist/"
          fi

      # 列出 dist 內容
      - name: List dist contents
        run: ls -la dist

      # 部署到 gh-pages 分支
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          keep_files: false # 設為 false，這樣主專案刪除的檔案才會在遠端被清除
